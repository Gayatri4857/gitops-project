apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: web-app
        image: 412268502663.dkr.ecr.ap-south-1.amazonaws.com/gitops-project:v1
        ports:
        - containerPort: 80